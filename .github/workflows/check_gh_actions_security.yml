# TODO: if zizmor doesn't pass, don't run any other action
name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["**"]

concurrency:
  group: gh-actions-security-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor latest via PyPI
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: false

      - name: Run zizmor 🌈
        run: |
          uv venv .venv
          uv pip install --require-hashes -r .github/zizmor-requirements.txt
          .venv/bin/zizmor --format=github .github/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
